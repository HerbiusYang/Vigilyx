  <text x="352" y="594" fill="#F8FBFF" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700">Deployment modes</text>
  <text x="352" y="628" fill="#A9BED2" font-family="Arial, Helvetica, sans-serif" font-size="17">Passive visibility first, inline enforcement when ready</text>

  <rect x="558" y="520" width="192" height="144" rx="24" fill="#0A1422" stroke="rgba(148,163,184,0.14)"/>
  <text x="586" y="564" fill="#F8FBFF" font-family="Arial, Helvetica, sans-serif" font-size="44" font-weight="700">Rust</text>
  <text x="586" y="594" fill="#F8FBFF" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700">Core runtime</text>
  <text x="586" y="628" fill="#A9BED2" font-family="Arial, Helvetica, sans-serif" font-size="17">Sniffer, parser, engine, API, and MTA in one stack</text>

