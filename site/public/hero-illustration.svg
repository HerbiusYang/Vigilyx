  <path d="M582 280L582 352" stroke="url(#paint4_linear)" stroke-width="4" stroke-linecap="round"/>

  <rect x="90" y="520" width="192" height="144" rx="24" fill="#0A1422" stroke="rgba(148,163,184,0.14)"/>
