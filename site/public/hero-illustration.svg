  <rect x="236" y="236" width="106" height="30" rx="15" fill="rgba(125,211,252,0.12)" stroke="rgba(125,211,252,0.16)"/>
  <text x="262" y="256" fill="#DDF6FF" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="700">Analyze</text>

  <rect x="456" y="88" width="294" height="192" rx="26" fill="#0A1422" stroke="rgba(125,211,252,0.18)"/>
  <text x="488" y="132" fill="#7DD3FC" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" letter-spacing="2">INLINE MTA</text>
