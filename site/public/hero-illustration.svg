  <text x="488" y="216" fill="#A9BED2" font-family="Arial, Helvetica, sans-serif" font-size="20">Accept / Quarantine / Reject</text>
  <rect x="488" y="236" width="120" height="30" rx="15" fill="rgba(15,118,110,0.16)" stroke="rgba(15,118,110,0.2)"/>
