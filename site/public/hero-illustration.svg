  <rect x="90" y="88" width="294" height="192" rx="26" fill="#0A1422" stroke="rgba(125,211,252,0.18)"/>
  <text x="122" y="132" fill="#5EEAD4" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" letter-spacing="2">MIRROR MODE</text>
  <text x="122" y="172" fill="#F8FBFF" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="700">Observe existing mail flow</text>
  <text x="122" y="216" fill="#A9BED2" font-family="Arial, Helvetica, sans-serif" font-size="20">SMTP / POP3 / IMAP / Webmail</text>
  <rect x="122" y="236" width="106" height="30" rx="15" fill="rgba(94,234,212,0.12)" stroke="rgba(94,234,212,0.16)"/>
