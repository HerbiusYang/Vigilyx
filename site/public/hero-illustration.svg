  <rect x="616" y="236" width="120" height="30" rx="15" fill="rgba(8,145,178,0.16)" stroke="rgba(8,145,178,0.2)"/>
  <text x="640" y="256" fill="#DDF6FF" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="700">Verdict</text>

  <rect x="140" y="352" width="560" height="110" rx="28" fill="#091321" stroke="rgba(148,163,184,0.14)"/>
