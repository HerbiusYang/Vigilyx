  <text x="118" y="594" fill="#F8FBFF" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700">Pipeline entries</text>
  <text x="118" y="628" fill="#A9BED2" font-family="Arial, Helvetica, sans-serif" font-size="17">Content, identity, link, attachment, DLP, YARA, verdict</text>

