# ═══════════════════════════════════════════════════
# HPA: auto-scale based on sandbox load
# ═══════════════════════════════════════════════════
#
# Scaling policy:
#   - Scale out when CPU > 70% (add VM instances to handle queued tasks)
#   - Scale in when CPU < 30% (save resources)
#   - Minimum 1 replica, maximum 5 replicas
#   - Scale-out cooldown 120s, scale-in cooldown 300s (sandboxes start slowly)
#
# Optional: pair this with KEDA custom metrics:
#   Trigger scale-out from the pending-task count reported by CAPEv2 /apiv2/cuckoo/status/
# ═══════════════════════════════════════════════════
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: vigilyx-sandbox-hpa
  namespace: vigilyx
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: vigilyx-sandbox
  minReplicas: 1
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 120
      policies:
        - type: Pods
          value: 1
          periodSeconds: 120
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 300
