[cuckoo]
version_check = no
machinery = kvm
memory_dump = no
max_analysis_count = 0
max_machines_count = 0
max_vmstartup_count = 5
freespace = 1024
tmppath =
rooter = /tmp/cuckoo-rooter
delete_original = no
delete_bin_copy = no

[resultserver]
ip = 0.0.0.0
port = 2042
upload_max_size = 134217728

[processing]
analysis_size_limit = 134217728
resolve_dns = yes
sort_pcap = yes

[database]
# SQLAlchemy backend (SQLite is the simplest option and needs no extra service)
connection = sqlite:///db/cuckoo.db
timeout = 60

[timeouts]
default = 120
critical = 60
vm_state = 60
