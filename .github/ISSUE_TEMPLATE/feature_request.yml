name: Feature Request
description: Propose a new feature or enhancement for Vigilyx
title: "[Feature]: "
labels: ["enhancement"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement.
        Please describe the feature clearly so we can evaluate and prioritize it.

  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which area does this feature relate to?
      options:
        - Email Security (threat detection pipeline)
        - MTA Proxy / Inline Mail Flow
        - Data Security (HTTP session analysis)
        - Network Monitoring
        - Protocol Parsing
        - SOAR / Automation
        - Dashboard / Frontend UI
        - Knowledge Base
        - AI / NLP Analysis
        - API
        - Deployment / DevOps
        - Other
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem does this feature solve? Why is it needed?
      placeholder: |
        Example: Currently the system cannot detect QR-code phishing in PDF
        attachments, which is a growing attack vector (see MITRE T1566.001).
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How would you like this to work?
      placeholder: |
        Example: Add a new detection module that extracts QR codes from PDF
        attachments using the `lopdf` crate, decodes the URL, and feeds it
        through the existing link_scan pipeline.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Have you considered other approaches? Why is the proposed solution better?
    validations:
      required: false

  - type: dropdown
    id: priority
    attributes:
      label: Priority (your assessment)
      description: How important is this to you?
      options:
        - Nice to have
        - Important (improves detection quality or usability)
        - Critical (blocks a real-world use case)
    validations:
      required: true

  - type: checkboxes
    id: contribution
    attributes:
      label: Contribution
      options:
        - label: I am willing to submit a pull request for this feature.
          required: false

  - type: checkboxes
    id: checklist
    attributes:
      label: Pre-submission Checklist
      options:
        - label: I searched existing issues and this has not been requested before.
          required: true
