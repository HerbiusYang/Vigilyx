name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

# Cancel in-progress runs for the same PR / branch
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  # Skip compile-time SQL verification -- no database available in CI
  SQLX_OFFLINE: "true"
  RUST_BACKTRACE: 1

jobs:
  # ──────────────────────────────────────────────
  # Rust: fmt, clippy, test, doc
  # ──────────────────────────────────────────────
  rust-checks:
    name: Rust checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libpcap-dev \
            pkg-config \
            libssl-dev

      - name: Install Rust 1.95.0 toolchain
        uses: dtolnay/rust-toolchain@1.95.0
        with:
          components: rustfmt, clippy

      - name: Cache Cargo registry + index
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
          key: cargo-registry-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            cargo-registry-${{ runner.os }}-

      - name: Cache Cargo build artifacts
        uses: actions/cache@v4
        with:
          path: target
          key: cargo-target-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}-${{ hashFiles('**/*.rs') }}
          restore-keys: |
            cargo-target-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}-
            cargo-target-${{ runner.os }}-

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy lint (warnings = errors)
        run: cargo clippy --workspace -- -D warnings

      - name: Run tests
        run: cargo test --workspace

      - name: Build documentation
        run: cargo doc --no-deps --workspace
        env:
          RUSTDOCFLAGS: "-D warnings"

  # ──────────────────────────────────────────────
  # Frontend: TypeScript type-check + Vite build
  # ──────────────────────────────────────────────
  frontend-checks:
    name: Frontend checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: Vite production build
        run: npx vite build
